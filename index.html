<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIN-UI-SON · 제외수 25 + 보너스 우선</title>
    <style>
        :root {
            --gold: #ffd700;
            --bg: #0b0b0b;
            --card: #1a1a1a;
            --accent: #00ffcc;
            --text-white: #ffffff;
            --bonus: #ff9933;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: var(--text-white);
            font-family: 'Malgun Gothic', sans-serif;
            padding: 6px;
        }
        .outer-border {
            border: 2px solid var(--gold);
            border-radius: 18px;
            padding: 10px;
            max-width: 480px;
            margin: 0 auto;
        }
        .header-box { text-align: center; margin-bottom: 4px; } /* 기존 8px → 4px */
        .prev-win-label { font-size: 9px; color: #aaa; line-height: 1.2; } /* 10px → 9px */
        .next-episode { font-size: 13px; font-weight: 900; color: #fff; text-shadow: 0 0 6px rgba(255,215,0,0.5); margin: 0; } /* 15px → 13px */
        .round-text { font-size: 15px; font-weight: 900; color: var(--gold); text-shadow: 0 0 8px var(--gold); margin: 0; } /* 17px → 15px */
        .base-info {
            display: flex;
            flex-wrap: wrap;
            gap: 2px; /* 3px → 2px */
            justify-content: center;
            align-items: center;
            margin: 2px 0; /* 5px → 2px */
        }
        .base-num-box {
            width: 22px; height: 22px; line-height: 22px; /* 24px → 22px */
            text-align: center; font-size: 9px; font-weight: 900; /* 10px → 9px */
            border-radius: 50%;
            background: #000;
            border: 1px solid var(--gold);
            display: inline-block;
            color: #fff;
        }
        .bonus-label { color: #888; font-size: 7px; margin: 0 1px; } /* 8px → 7px */
        .status-info {
            font-size: 11px;
            color: var(--accent);
            line-height: 1.4;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 8px;
            margin-top: 6px;
            border: 1px solid #333;
            max-height: 380px;
            overflow-y: auto;
        }
        .highlight-gold { color: var(--gold); font-weight: bold; }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin: 8px 0 4px;
        }
        button {
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            height: 38px; /* 42px → 38px */
            font-size: 13px; /* 14px → 13px */
            transition: 0.2s;
        }
        button:active { transform: scale(0.96); opacity: 0.8; }
        .btn-5set { background: linear-gradient(135deg, #00ffcc, #00a884); color: #000; }
        .btn-main { background: linear-gradient(135deg, #ffd700, #b8860b); color: #000; }
        .btn-sub { background: #222; color: #fff; border: 1px solid #444; }
        .btn-reset { grid-column: span 2; background: #333; color: #aaa; height: 32px; } /* 36px → 32px */
        .btn-review { grid-column: span 2; background: #ff00ff; color: white; height: 36px; } /* 40px → 36px */

        .control-panel {
            margin: 6px 0;
            border-top: 1px solid #333;
            padding-top: 6px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin: 4px 0;
        }
        .slider-container input[type=range] {
            flex: 3;
            height: 6px;
            background: var(--accent);
            border-radius: 3px;
            -webkit-appearance: none;
        }
        .slider-container input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--gold);
            border-radius: 50%;
            cursor: pointer;
        }
        .compress-value {
            min-width: 28px;
            color: var(--gold);
            font-weight: bold;
        }
        .apply-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            font-weight: bold;
            cursor: pointer;
            height: 32px;
            font-size: 12px;
        }

        .round-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin: 8px 0;
        }
        .round-selector input {
            width: 65px;
            height: 32px;
            text-align: center;
            background: #222;
            border: 2px solid var(--gold);
            color: #fff;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
        }
        .round-selector button {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 0 12px;
            height: 32px;
            font-weight: bold;
            font-size: 12px;
        }

        .user-info {
            background: #333;
            color: var(--accent);
            padding: 3px 6px; /* 4px 8px → 3px 6px */
            border-radius: 30px;
            font-size: 10px; /* 11px → 10px */
            display: inline-block;
            margin-top: 2px; /* 4px → 2px */
            line-height: 1.3;
        }
        .change-name-btn {
            background: #00ccff;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 2px 5px; /* 2px 6px → 2px 5px */
            font-size: 8px; /* 9px → 8px */
            margin-left: 3px;
            cursor: pointer;
            height: 20px;
            line-height: 1;
        }

        .small-note {
            margin-top: 4px;
            color: #888;
            font-size: 8px;
            text-align: center;
        }

        /* 팝업 */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 10px;
        }
        .popup-content {
            background: var(--card);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 20px;
            max-width: 440px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }
        .popup-close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            background: transparent;
            border: none;
            color: var(--gold);
            cursor: pointer;
        }
        .popup-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            color: var(--gold);
        }

        .review-winning-numbers {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .winning-ball {
            width: 30px; height: 30px; line-height: 30px;
            text-align: center; font-size: 13px; font-weight: 900;
            border-radius: 50%;
            background: #000;
            border: 2px solid var(--gold);
            color: #fff;
        }
        .winning-ball.bonus { border-color: var(--bonus); color: var(--bonus); }

        .winning-input {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .winning-input input {
            width: 38px; height: 38px;
            text-align: center;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 30px;
            font-size: 13px;
        }

        .combo-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px;
            border-bottom: 1px solid #333;
        }
        .review-combo-grid {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .review-num-box {
            width: 26px; height: 26px; line-height: 26px;
            text-align: center; font-size: 10px; font-weight: 900;
            border-radius: 50%;
            background: #000;
            border: 1px solid #444;
            color: #fff;
        }
        .review-num-box.matched { border-color: #00ff00; color: #00ff00; }
        .review-num-box.bonus-matched { border-color: var(--bonus); color: var(--bonus); }

        .match-badge {
            background: #00e6b8;
            color: #000;
            border-radius: 20px;
            padding: 2px 6px;
            font-size: 9px;
            font-weight: bold;
        }

        .basket-large {
            font-size: 13px;
            font-weight: bold;
            margin-top: 5px;
            padding: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            white-space: nowrap;
            overflow-x: auto;
            color: #fff;
        }
        .stat-row {
            margin: 4px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 4px;
        }
        .stat-label {
            color: var(--gold);
            font-weight: bold;
            min-width: 65px;
            font-size: 10px;
        }
        .number-group {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 2px 3px;
        }
        .number-group span { color: #fff; }
    </style>
</head>
<body>
<div class="outer-border">
    <div class="header-box">
        <div class="prev-win-label" id="prevWinLabel">📌 이전 회차 당첨번호</div>
        <div class="base-info" id="baseRoundInfo"></div>
        <div class="next-episode">SHIN-UI-SON · 제외수 25 + 보너스 우선</div>
        <div class="round-text" id="roundDisplay">1213회 예상</div>
        <div id="userDisplay" class="user-info"></div>
        <div id="status" class="status-info">초기화 중...</div>
    </div>

    <!-- 압축수 선택 슬라이더 (1~14) -->
    <div class="control-panel">
        <label style="display:block; text-align:center; margin-bottom:4px; font-size:11px;">🔢 추천 개수 (1~14)</label>

            <input type="range" id="compressRange" min="1" max="14" value="14" step="1" 
                   oninput="document.getElementById('compressValue').innerText = this.value">
            <span id="compressValue" class="compress-value">14</span>
            <button class="apply-btn" onclick="applyCompress()">적용</button>
        </div>
    </div>

    <!-- 회차 설정 -->
    <div class="round-selector">
        <button onclick="changeRound(-1)">−</button>
        <input type="number" id="baseRoundInput" min="901" max="1300" value="1213" step="1" readonly>
        <button onclick="changeRound(1)">+</button>
        <button onclick="setBaseRound()">이동</button>
    </div>

    <!-- 메인 버튼 -->
    <div class="btn-group">
        <button class="btn-5set" onclick="generateCombinations(5)">5조합</button>
        <button class="btn-main" onclick="generateCombinations(10)">10조합</button>
        <button class="btn-sub" onclick="openPopup()">보관함</button>
        <button class="btn-sub" onclick="clearStorage()">초기화</button>
        <button class="btn-sub btn-reset" onclick="location.reload()">새로고침</button>
        <button class="btn-review" onclick="openReviewPopup()">📊 당첨 확인</button>
    </div>

    <div class="small-note">🎯 <span id="targetRound">1213</span>회 예상 · 생성 조합은 자동 저장</div>
</div>

<!-- 토스트 메시지 -->
<div id="toast" style="position:fixed; bottom:20px; left:0; width:100%; text-align:center; z-index:9999; display:none; pointer-events:none;">
    <span style="background:#333; color:#ffd700; padding:4px 10px; border-radius:30px; font-size:11px;">✅ 저장됨</span>
</div>

<!-- 보관함 팝업 -->
<div id="popup" class="popup-overlay" style="display:none;">
    <div class="popup-content">
        <button class="popup-close" onclick="closePopup()">&times;</button>
        <div class="popup-title">📦 내 보관함</div>
        <div id="storage"></div>
    </div>
</div>

<!-- 당첨 확인 팝업 -->
<div id="reviewPopup" class="popup-overlay" style="display:none;">
    <div class="popup-content">
        <button class="popup-close" onclick="closeReviewPopup()">&times;</button>
        <div class="popup-title" id="reviewTitle">1213회 당첨 확인</div>
        <div class="review-winning-numbers" id="reviewWinningDisplay"></div>
        <div class="ai-info-box" id="reviewAIInfo" style="background:#1a1a1a; padding:8px; border-radius:8px; font-size:11px; margin:8px 0;"></div>
        <div style="text-align:center; margin:4px 0; font-size:12px;">당첨번호 6개 + 보너스 입력</div>
        <div class="winning-input">
            <input type="number" id="win1" min="1" max="45" placeholder="1">
            <input type="number" id="win2" min="1" max="45" placeholder="2">
            <input type="number" id="win3" min="1" max="45" placeholder="3">
            <input type="number" id="win4" min="1" max="45" placeholder="4">
            <input type="number" id="win5" min="1" max="45" placeholder="5">
            <input type="number" id="win6" min="1" max="45" placeholder="6">
        </div>
        <div style="text-align:center; font-size:12px;">보너스</div>
        <div class="winning-input">
            <input type="number" id="bonus" min="1" max="45" placeholder="보너스">
        </div>
        <div style="display:flex; gap:8px; justify-content:center; margin:8px 0;">
            <button class="apply-btn" onclick="compareNumbers()">비교하기</button>
        </div>
        <div id="reviewResult" class="result-box" style="background:#222; padding:8px; border-radius:8px; font-size:12px;"></div>
        <div id="savedMatch" style="margin-top:8px;"></div>
    </div>
</div>

<!-- 생성된 조합 목록 팝업 -->
<div id="comboListPopup" class="popup-overlay" style="display:none;">

    </div>
</div>

    // ===== 제외수 25 추출 함수 =====
    function getExcludedNumbers(round, countLimit = 25) {
        const idx = FULL_DATA.findIndex(r => r[0] === round - 1);
        if(idx === -1) return [];
        
        const target = FULL_DATA[idx].slice(1,7);
        const prevTarget = FULL_DATA[idx+1] ? FULL_DATA[idx+1].slice(1,7) : [];
        
        let pool = [];

        target.forEach(n => {
            if(n > 1) pool.push(n - 1);
            if(n < 45) pool.push(n + 1);
        });

        const ends = target.map(n => n % 10);
        for(let i = 1; i <= 45; i++) {
            if(ends.includes(i % 10)) pool.push(i);
        }

        let stats = {};
        FULL_DATA.slice(idx, idx + 30).forEach(r => {
            r.slice(1, 8).forEach(n => stats[n] = (stats[n] || 0) + 1);
        });
        let sortedStats = Object.entries(stats).sort((a, b) => b[1] - a[1]);
        
        sortedStats.slice(0, 5).forEach(x => pool.push(Number(x[0])));
        sortedStats.slice(-5).forEach(x => pool.push(Number(x[0])));

        target.forEach(n => {
            if(prevTarget.includes(n)) pool.push(n);
        });

        let excluded = [...new Set(pool)].slice(0, countLimit);
        
        while(excluded.length < countLimit) {
            let rnd = Math.floor(Math.random() * 45) + 1;
            if(!excluded.includes(rnd)) excluded.push(rnd);
        }
        
        return excluded.sort((a, b) => a - b);
    }

    // ===== 초기화 =====
    function initPairCountMatrix() {
        for (let i = 1; i <= 45; i++) for (let j = 1; j <= 45; j++) pairCountMatrix[i][j] = 0;
        FULL_DATA.forEach(round => {
            const nums = round.slice(1, 7);
            for (let a of nums) {
                for (let b of nums) {
                    if (a < b) { pairCountMatrix[a][b]++; pairCountMatrix[b][a]++; }
                }
            }
        });
    }

    // ===== 14수 선정 (그룹별 연관성) =====
    function selectFull14(survivors, lastWinning, baseScore) {
        if (survivors.length <= 14) return survivors.slice().sort((a,b)=>a-b);

        let sorted = survivors.map(n => ({ n, s: baseScore[n] || 0 })).sort((a,b) => b.s - a.s || a.n - b.n);
        let ranked = sorted.map(x => x.n);
        let n = ranked.length;

        let topSize = Math.floor(n * 0.4);
        let midSize = Math.floor(n * 0.3);
        let bottomSize = n - topSize - midSize;

        let topGroup = ranked.slice(0, topSize);
        let midGroup = ranked.slice(topSize, topSize + midSize);
        let bottomGroup = ranked.slice(topSize + midSize);

        let topScored = topGroup.map(n => ({ n, score: getAssociationScore(n, lastWinning) })).sort((a,b) => b.score - a.score || a.n - b.n);
        let midScored = midGroup.map(n => ({ n, score: getAssociationScore(n, lastWinning) })).sort((a,b) => b.score - a.score || a.n - b.n);
        let bottomScored = bottomGroup.map(n => ({ n, score: getAssociationScore(n, lastWinning) })).sort((a,b) => b.score - a.score || a.n - b.n);

        let takeTop = Math.min(6, topGroup.length);
        let takeMid = Math.min(4, midGroup.length);
        let takeBottom = 14 - takeTop - takeMid;
        if (takeBottom > bottomGroup.length) {
            takeBottom = bottomGroup.length;
            takeMid = Math.min(4, midGroup.length);
            takeTop = 14 - takeBottom - takeMid;
            if (takeTop > topGroup.length) takeTop = topGroup.length;
        }

        let selected = [];
        selected.push(...topScored.slice(0, takeTop).map(x => x.n));
        selected.push(...midScored.slice(0, takeMid).map(x => x.n));
        selected.push(...bottomScored.slice(0, takeBottom).map(x => x.n));
        return selected.sort((a,b) => a - b);
    }

    // ===== 메인 분석 함수 =====
    function analyze() {
        const targetRound = currentBaseRound;
        const prevRound = targetRound - 1;
        const prevData = FULL_DATA.find(r => r[0] === prevRound);
        if (!prevData) {
            document.getElementById('baseRoundInfo').innerHTML = '<span>데이터 없음</span>';
            document.getElementById('prevWinLabel').innerHTML = `📌 ${prevRound}회 없음`;
            return;
        }

        const baseNums = prevData.slice(1, 7);
        const bonus = prevData[7];
        let ballHtml = baseNums.map(n => `<span class="base-num-box">${n}</span>`).join('');
        ballHtml += `<span class="bonus-label">보너스</span><span class="base-num-box">${bonus}</span>`;
        document.getElementById('baseRoundInfo').innerHTML = ballHtml;
        document.getElementById('prevWinLabel').innerHTML = `📌 ${prevRound}회 당첨번호`;
        document.getElementById('roundDisplay').innerHTML = `${targetRound}회 예상`;
        document.getElementById('targetRound').innerText = targetRound;
        document.getElementById('reviewTitle').innerHTML = `${targetRound}회 확인`;

        survivors = getExcludedNumbers(targetRound, 25);

        let freq = {};
        survivors.forEach(n => freq[n] = 0);
        for (let i = 1; i <= 10; i++) {
            const r = targetRound - i;
            const row = FULL_DATA.find(x => x[0] === r);
            if (row) {
                row.slice(1, 7).forEach(n => { if (survivors.includes(n)) freq[n] += 1; });
                if (survivors.includes(row[7])) freq[row[7]] += 0.5;
            }
        }
        weightedScore = freq;

        let bonusPool = [];
        for (let i = 1; i <= 10; i++) {
            const r = targetRound - i;
            const row = FULL_DATA.find(x => x[0] === r);
            if (row) bonusPool.push(row[7]);
        }
        bonusNums = [...new Set(bonusPool)].sort((a,b)=>a-b);

        full14 = selectFull14(survivors, baseNums, weightedScore);
        let full14Set = new Set(full14);

        // ----- 추천수(basket) 선정 (압축수 6 이하이면 보너스 교집합 우선) -----
        let bonusSet = new Set(bonusNums);
        let bonusInFull14 = full14.filter(n => bonusSet.has(n));
        let restFull14 = full14.filter(n => !bonusSet.has(n));

        // 점수 순 정렬
        let bonusScored = bonusInFull14.map(n => ({ n, score: getAssociationScore(n, baseNums) })).sort((a,b) => b.score - a.score || a.n - b.n);
        let restScored = restFull14.map(n => ({ n, score: getAssociationScore(n, baseNums) })).sort((a,b) => b.score - a.score || a.n - b.n);

        let selected = [];
        if (currentCompress <= 6) {
            // 보너스 교집합 우선
            let takeBonus = Math.min(bonusScored.length, currentCompress);
            selected.push(...bonusScored.slice(0, takeBonus).map(x => x.n));
            let remaining = currentCompress - takeBonus;
            if (remaining > 0) {
                selected.push(...restScored.slice(0, remaining).map(x => x.n));
            }
        } else {
            // 기존 방식: 전체 full14에서 점수 순
            let fullRanked = full14.map(n => ({ n, score: getAssociationScore(n, baseNums) })).sort((a,b) => b.score - a.score || a.n - b.n);
            selected = fullRanked.slice(0, currentCompress).map(x => x.n);
        }
        basket = selected.sort((a,b) => a - b);
        let basketSet = new Set(basket);

        // 14수 중 미추천
        compressedOut4 = full14.filter(n => !basketSet.has(n));

        // 14수 밖 생존자 전체 (점수 순으로 정렬)
        let outside = survivors.filter(n => !full14Set.has(n));
        let outsideWithScore = outside.map(n => ({ n, score: weightedScore[n] || 0 })).sort((a,b) => b.score - a.score || a.n - b.n);
        middle = outsideWithScore.map(x => x.n); // 전체로 변경

        const winData = FULL_DATA.find(r => r[0] === targetRound);
        const winNums = winData ? winData.slice(1, 7) : [];
        const winBonus = winData ? winData[7] : null;
        const winSet = new Set(winNums);
        if (winBonus) winSet.add(winBonus);

        function formatNumber(num) {
            if (winBonus === num) return `<span style="color:var(--bonus); font-weight:bold;">${num}</span>`;
            if (winSet.has(num)) return `<span style="color:#00ff00; font-weight:bold;">${num}</span>`;
            return `<span style="color:#fff;">${num}</span>`;
        }

        document.getElementById('status').innerHTML = `
            <div class="stat-row"><span class="stat-label">제외수25</span> <div class="number-group">${survivors.map(formatNumber).join(' ')}</div></div>
            <div class="stat-row"><span class="stat-label">보너스풀</span> <div class="number-group">${bonusNums.map(formatNumber).join(' ')}</div></div>
            <div class="stat-row"><span class="stat-label">14수</span> <div class="number-group">${full14.map(formatNumber).join(' ')}</div></div>
            <div class="stat-row"><span class="stat-label">미추천(14수↓)</span> <div class="number-group">${compressedOut4.map(formatNumber).join(' ')}</div></div>
            <div class="stat-row"><span class="stat-label">14수 밖 전체</span> <div class="number-group">${middle.map(formatNumber).join(' ')}</div></div>
            <div class="basket-large">⭐ 추천 ${basket.length}수: ${basket.map(formatNumber).join(' ')}</div>
        `;

        let reviewAI = document.getElementById('reviewAIInfo');
        if (reviewAI) {
            reviewAI.innerHTML = `
                <div>🔹 제외수25: ${survivors.map(formatNumber).join(' ')}</div>
                <div>🔸 14수: ${full14.map(formatNumber).join(' ')}</div>
                <div>🔹 추천 ${basket.length}수: ${basket.map(formatNumber).join(' ')}</div>
                <div>🔸 미추천(14수 중): ${compressedOut4.map(formatNumber).join(' ')}</div>
                <div>🔹 14수 밖 전체: ${middle.map(formatNumber).join(' ')}</div>
            `;
        }

        let winDiv = document.getElementById('reviewWinningDisplay');
        if (winDiv) {
            winDiv.innerHTML = winNums.map(n => `<span class="winning-ball">${n}</span>`).join('') + (winBonus ? `<span class="winning-ball bonus">${winBonus}</span>` : '');
        }
    }

    // ===== 조합 생성 (궁합 쌍 1개 + 보너스 교집합, 압축수 6이하 100%) =====
    function generateCombinations(limit) {
        let sourceBasket = basket;
        if (sourceBasket.length < 6) {
            sourceBasket = full14;
            showToast(`추천수가 부족하여 14수 전체에서 조합을 생성합니다.`);
        }

        // 보너스와 14수의 교집합 계산
        let bonusSet = new Set(bonusNums);
        let bonusInFull14 = full14.filter(n => bonusSet.has(n));

        // 압축수가 6 이하인지 확인
        let isSmallCompress = currentCompress <= 6;

        // 1. 가능한 모든 숫자 쌍과 그 궁합 점수 계산
        let pairs = [];
        for (let i = 0; i < sourceBasket.length; i++) {
            for (let j = i + 1; j < sourceBasket.length; j++) {
                let a = sourceBasket[i];
                let b = sourceBasket[j];
                let score = pairCountMatrix[a][b];
                pairs.push({ a, b, score, key: `${a},${b}` });
            }
        }
        pairs.sort((x, y) => y.score - x.score);

        // 2. 상위 100개 쌍 중에서 무작위로 limit개 선택 (중복 없이)
        let topPairs = pairs.slice(0, 100);
        let selectedPairs = [];
        let usedIndices = new Set();
        while (selectedPairs.length < limit && usedIndices.size < topPairs.length) {
            let idx = Math.floor(Math.random() * topPairs.length);
            if (!usedIndices.has(idx)) {
                usedIndices.add(idx);
                selectedPairs.push(topPairs[idx]);
            }
        }
        if (selectedPairs.length < limit) {
            for (let p of pairs) {
                if (selectedPairs.length >= limit) break;
                if (!selectedPairs.some(sp => sp.key === p.key)) {
                    selectedPairs.push(p);
                }
            }
        }

        // 3. 각 선택된 쌍에 대해 조합 생성
        let combos = [];
        let usedKeys = new Set();

        for (let pair of selectedPairs) {
            if (combos.length >= limit) break;

            let base = [pair.a, pair.b];
            let available = sourceBasket.filter(n => !base.includes(n));
            if (available.length < 4) continue;

            // 보너스 교집합 포함 여부 결정
            let forceBonus = false;
            let bonusNum = null;
            if (bonusInFull14.length > 0) {
                // 압축수가 6 이하이면 무조건 포함, 아니면 50% 확률
                let prob = isSmallCompress ? 1.0 : 0.5;
                if (Math.random() < prob) {
                    let availableBonus = available.filter(n => bonusInFull14.includes(n));
                    if (availableBonus.length > 0) {
                        forceBonus = true;
                        bonusNum = availableBonus[Math.floor(Math.random() * availableBonus.length)];
                        base.push(bonusNum);
                        available = available.filter(n => n !== bonusNum);
                    }
                }
            }

            let need = forceBonus ? 3 : 4;
            if (available.length < need) continue;

            let shuffled = available.sort(() => Math.random() - 0.5);
            let rest = shuffled.slice(0, need);
            let full = [...base, ...rest].sort((a, b) => a - b);
            let key = full.join(',');

            if (!usedKeys.has(key)) {
                usedKeys.add(key);
                combos.push({ numbers: full, key, score: pair.score });
            }
        }

        // 4. 부족하면 랜덤 조합 추가
        while (combos.length < limit) {
            let shuffled = [...sourceBasket].sort(() => Math.random() - 0.5);
            let arr = shuffled.slice(0, 6).sort((a, b) => a - b);
            let key = arr.join(',');
            if (!usedKeys.has(key)) {
                usedKeys.add(key);
                let totalScore = 0;
                for (let i = 0; i < 6; i++) {
                    for (let j = i+1; j < 6; j++) {
                        totalScore += pairCountMatrix[arr[i]][arr[j]];
                    }
                }
                combos.push({ numbers: arr, key, score: totalScore });
            }
        }

        generatedCombos = combos.slice(0, limit);
        showComboList();
    }

    function showComboList() {
        let popup = document.getElementById('comboListPopup');
        let content = document.getElementById('comboListContent');
        if (!generatedCombos.length) {
            content.innerHTML = '<div style="text-align:center;">조합 없음</div>';
            popup.style.display = 'flex';
            return;
        }
        const winData = FULL_DATA.find(r => r[0] === currentBaseRound);
        const winNums = winData ? winData.slice(1, 7) : [];
        const bonus = winData ? winData[7] : null;
        
        let html = '';
        generatedCombos.forEach(c => {
            let numsHtml = c.numbers.map(n => {
                let cls = '';
                if (winNums.includes(n)) cls = 'matched';
                else if (bonus === n) cls = 'bonus-matched';
                return `<span class="review-num-box ${cls}">${n}</span>`;
            }).join('');
            
            let match = c.numbers.filter(n => winNums.includes(n)).length;
            let hasBonus = c.numbers.includes(bonus);
            let matchText = match > 0 ? `${match}개 일치` : '0개 일치';
            if (hasBonus) matchText += ' + 보너스';
            
            html += `<div class="combo-item-row">
                <div class="review-combo-grid">${numsHtml}</div>
                <div><span class="match-badge">${matchText}</span> 궁합 ${c.score}</div>
                <div><button class="change-name-btn" onclick="saveComboFromList('${c.key}')">저장</button></div>
            </div>`;
        });
        content.innerHTML = html;
        popup.style.display = 'flex';
    }
    function saveComboFromList(key) { saveToBox(key); }
    function saveAllGeneratedCombos() {
        let cnt = 0;
        generatedCombos.forEach(c => {
            if (!savedNumbers.includes(c.key)) { savedNumbers.push(c.key); cnt++; }
        });
        if (cnt) {
            localStorage.setItem(`lottoSave_${userName}`, JSON.stringify(savedNumbers));
            showToast(`📦 ${cnt}개 저장`);
        } else showToast('모두 중복');
        closeComboListPopup();
    }
    function closeComboListPopup() { document.getElementById('comboListPopup').style.display = 'none'; }

    // ===== 복기 팝업 =====
    function openReviewPopup() {
        let winData = FULL_DATA.find(r => r[0] === currentBaseRound);
        if (winData) {
            for (let i=1; i<=6; i++) document.getElementById(`win${i}`).value = winData[i] || '';
            document.getElementById('bonus').value = winData[7] || '';
        } else {
            for (let i=1; i<=6; i++) document.getElementById(`win${i}`).value = '';
            document.getElementById('bonus').value = '';
        }
        document.getElementById('reviewPopup').style.display = 'flex';
    }
    function closeReviewPopup() { document.getElementById('reviewPopup').style.display = 'none'; }

    function compareNumbers() {
        let win = [];
        for (let i=1; i<=6; i++) {
            let v = parseInt(document.getElementById(`win${i}`).value);
            if (isNaN(v)) { alert('번호를 모두 입력'); return; }
            win.push(v);
        }
        let bonus = parseInt(document.getElementById('bonus').value);
        if (isNaN(bonus)) { alert('보너스 입력'); return; }
        let winSet = new Set(win);

        let aiMatch = basket.filter(n => winSet.has(n));
        document.getElementById('aiMatch').innerText = `${aiMatch.length}개 일치`;
        document.getElementById('aiMatchedList').innerText = aiMatch.length ? `일치: ${aiMatch.join(', ')}` : '';
        document.getElementById('aiBonus').innerText = bonusNums.includes(bonus) ? '보너스가 보너스풀에 있음' : '보너스 없음';

        let savedDiv = document.getElementById('savedMatch');
        if (!savedNumbers.length) savedDiv.innerHTML = '저장 조합 없음';
        else {
            let html = '';
            savedNumbers.forEach(key => {
                let nums = key.split(',').map(Number);
                let match = nums.filter(n => winSet.has(n)).length;
                let hasBonus = nums.includes(bonus);
                let numsHtml = nums.map(n => {
                    let matched = winSet.has(n);
                    let isBonus = (bonus === n);
                    let cls = matched ? 'matched' : (isBonus ? 'bonus-matched' : '');
                    return `<span class="review-num-box ${cls}">${n}</span>`;
                }).join('');
                html += `<div class="combo-item-row"><div>${numsHtml}</div><div>${match}개${hasBonus ? '+B' : ''}</div></div>`;
            });
            savedDiv.innerHTML = html;
        }
    }

    // ===== 초기 실행 =====
    window.onload = function() {
        initPairCountMatrix();
        initUser();
        document.getElementById('compressRange').value = currentCompress;
        document.getElementById('compressValue').innerText = currentCompress;
        document.getElementById('baseRoundInput').value = currentBaseRound;
        analyze();
    };
</script>
