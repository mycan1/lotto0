            [1002,17,25,33,35,38,45,15],[1001,6,10,12,14,20,42,15]
        ];

        // ========================================================================
        // 2. 전역 변수
        // ========================================================================
        let top6Freq2 = [];      
        let top6NextFreq2 = [];  
        let activeFreq2 = [];    
        let globalIntersectionMap = {};
        let globalFreqData = {};
        let similarData = null, freqData = null, top10 = [], low10 = [], pool = [], winData = null, baseNums = [];
        let top6AllUnique = [];
        let lastTopPred = [];
        let lastBonusIntersection = [];

        // ========================================================================
        // 3. 헬퍼 함수
        // ========================================================================
        function getWinning(round) {
            const row = DATA.find(r => r[0] === round);
            return row ? { main: row.slice(1, 7), bonus: row[7] } : null;
        }

        function findSimilar(baseRound, startRound, minMatch) {
            const prev = getWinning(baseRound - 1);
            if (!prev) return { similar: [], prevNums: [] };
            const baseNums = prev.main;
            const result = [];
            const winData = getWinning(baseRound);
            
            for (const row of DATA) {
                const r = row[0];
                if (r >= baseRound || r < startRound) continue;
                const nums = row.slice(1, 7);
                const matched = nums.filter(n => baseNums.includes(n));
                if (matched.length >= minMatch) {
                    const next = (r + 1 < baseRound) ? getWinning(r + 1) : null;
                    let winMatchCount = 0;
                    if (winData) {
                        winMatchCount = nums.filter(n => winData.main.includes(n)).length;
                    }
                    result.push({
                        round: r,
                        nums: nums,
                        bonus: row[7],
                        matched: matched,
                        matchCount: matched.length,
                        nextNums: next ? next.main : [],
                        nextBonus: next ? next.bonus : null,
                        winMatchCount: winMatchCount
                    });
                }
            }
            result.sort((a, b) => {
                if (b.winMatchCount !== a.winMatchCount) return b.winMatchCount - a.winMatchCount;
                return b.matchCount - a.matchCount;
            });
            return { similar: result, prevNums: baseNums };
        }

        function calcFreq(similar) {
            const f = {};
            for (let i = 1; i <= 45; i++) f[i] = 0;
            for (const s of similar) {
                for (const n of s.nextNums) f[n] = (f[n] || 0) + 1;
                if (s.nextBonus !== null) f[s.nextBonus] = (f[s.nextBonus] || 0) + 1;
                for (const n of s.nums) f[n] = (f[n] || 0) + 1;
                if (s.bonus !== null) f[s.bonus] = (f[s.bonus] || 0) + 1;
            }
            return f;
        }

        function getTop(freq, n) {
            return Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, n).map(([k]) => parseInt(k));
        }

        function getLow(freq, n) {
            return Object.entries(freq).sort((a, b) => a[1] - b[1]).slice(0, n).map(([k]) => parseInt(k));
        }

        function getAbove2(freq) {
            return Object.entries(freq).filter(([k, v]) => v >= 2).map(([k]) => parseInt(k)).sort((a, b) => a - b);
        }

        function makeCombos(pool) {
            const n = pool.length;
            if (n < 6) return [];

            const sorted = [...pool].sort((a, b) => {
                const diff = (globalFreqData[b] || 0) - (globalFreqData[a] || 0);
                if (diff !== 0) return diff;
                return a - b;
            });

            const combos = [];
            const total = 10;
            const seen = new Set();

            for (let i = 0; i < total; i++) {
                const combo = [];
                for (let j = 0; j < 6; j++) {
                    const idx = (i + j) % n;
                    combo.push(sorted[idx]);
                }

                // 조합 내부는 숫자 오름차순 정렬 (마킹 편의)
                combo.sort((a, b) => a - b);

                const key = combo.join(',');
                if (!seen.has(key)) {
                    seen.add(key);
                    combos.push(combo);
                }
            }

            while (combos.length < total) {
                if (combos.length > 0) {
                    combos.push([...combos[combos.length - 1]]);
                } else {
                    break;
                }
            }

            return combos;
        }

        // ========================================================================
        // ★ 강력 후보 추출 (단순 Fallback, 되돌리기)
        // ========================================================================
        function getStrongCandidates() {
            if (!similarData) return [];

            const topPredNums = lastTopPred.map(item => item.num);
            const bonusInter = lastBonusIntersection;

            // ③번 독자 그룹 (③ - ③∩TOP10)
            const exclusiveGroup = activeFreq2.filter(n => !topPredNums.includes(n));

            let candidates = [];

            // 1순위: ③번 독자 그룹 ∩ 두 보너스 교집합 (최적 조건)
            if (exclusiveGroup.length > 0 && bonusInter.length > 0) {
                candidates = exclusiveGroup.filter(n => bonusInter.includes(n));
            }

            // 2순위: ③번 독자 그룹 (Fallback 1)
            const needed = 5 - candidates.length;
            if (needed > 0) {
                const extra1 = exclusiveGroup.filter(n => !candidates.includes(n));
                const add1 = extra1.slice(0, needed);
                candidates = candidates.concat(add1);
            }

            // 3순위: ③번 전체 (Fallback 2)
            const needed2 = 5 - candidates.length;
            if (needed2 > 0) {
                const extra2 = activeFreq2.filter(n => !candidates.includes(n));
                const add2 = extra2.slice(0, needed2);
                candidates = candidates.concat(add2);
            }

            // 4순위: 전체 1~45 (Fallback 3)
            const needed3 = 5 - candidates.length;
            if (needed3 > 0) {
                const allNums = Object.keys(globalFreqData).map(Number);
                const extra3 = allNums.filter(n => !candidates.includes(n));
                const add3 = extra3.slice(0, needed3);
                candidates = candidates.concat(add3);
            }

            // 최종 후보를 빈도 내림차순으로 정렬 (1위가 가장 강력)
            candidates.sort((a, b) => (globalFreqData[b] || 0) - (globalFreqData[a] || 0));
            return candidates.slice(0, 5);
        }

        function getStrongOne() {
            const candidates = getStrongCandidates();
            return candidates.length > 0 ? candidates[0] : null;
        }

        function getStrongFive() {
            return getStrongCandidates();
        }

        // ========================================================================
        // 4. 분석 실행 (④번 개선 반영)
        // ========================================================================
        function runAnalysis() {
            const base = parseInt(document.getElementById('baseRound').value) || 1232;
            const start = parseInt(document.getElementById('startRound').value) || 1000;
            const min = parseInt(document.getElementById('minMatch').value) || 2;

            const result = findSimilar(base, start, min);
            if (result.similar.length === 0) {
                document.getElementById('resultArea').innerHTML = `<div style="color:#f39c12; padding:20px; text-align:center;">
                    ⚠️ 유사회차 없음 (최소 일치 개수 ${min}개)
                </div>`;
                return;
            }

            similarData = result.similar;
            baseNums = result.prevNums;
            const freq = calcFreq(result.similar);
            freqData = freq;
            globalFreqData = freq;
            top10 = getTop(freq, 10);
            low10 = getLow(freq, 10);
            pool = getAbove2(freq);
            winData = getWinning(base);

            const top6 = result.similar.slice(0, 6);
            const top5 = result.similar.slice(0, 5);

            // ①번 (상위 6개 유사회차 전체 중복제거)
            const top6AllNums = [];
            for (const s of top6) {
                const allNums = [...s.nums];
                if (s.bonus !== null) allNums.push(s.bonus);
                for (const n of allNums) top6AllNums.push(n);
            }
            top6AllUnique = [...new Set(top6AllNums)].sort((a,b)=>a-b);

            // 상위 6개 풀 (③번 fallback 용)
            const top6Freq = {};
            for (const n of top6AllNums) top6Freq[n] = (top6Freq[n] || 0) + 1;
            const top6Freq2_calc = Object.keys(top6Freq).filter(k => top6Freq[k] >= 2).map(Number).sort((a,b)=>a-b);
            top6Freq2 = top6Freq2_calc;

            // 상위 5개 풀 (③번 기본)
            const top5AllNums = [];
            for (const s of top5) {
                const allNums = [...s.nums];
                if (s.bonus !== null) allNums.push(s.bonus);
                for (const n of allNums) top5AllNums.push(n);
            }
            const top5Freq = {};
            for (const n of top5AllNums) top5Freq[n] = (top5Freq[n] || 0) + 1;
            const top5Freq2 = Object.keys(top5Freq).filter(k => top5Freq[k] >= 2).map(Number).sort((a,b)=>a-b);

            let usedTopCount = 5;
            if (top5Freq2.length <= 7) {
                activeFreq2 = top6Freq2_calc;
                usedTopCount = 6;
            } else {
                activeFreq2 = top5Freq2;
                usedTopCount = 5;
            }

            // 기존 ④번 (상위 6개 다음회차)
            const top6NextRounds = [];
            const top6NextAllNums = [];
            const top6NextSet = new Set();
            for (const s of top6) {
                if (s.round + 1 < base && s.nextNums.length > 0) {
                    top6NextRounds.push(s.round + 1);
                    const allNext = [...s.nextNums];
                    if (s.nextBonus !== null) allNext.push(s.nextBonus);
                    for (const n of allNext) {
                        top6NextAllNums.push(n);
                        top6NextSet.add(n);
                    }
                }
            }
            const top6NextNums = [...top6NextSet].sort((a,b)=>a-b);
            const top6NextFreq = {};
            for (const n of top6NextAllNums) top6NextFreq[n] = (top6NextFreq[n] || 0) + 1;
            const oldNextFreq2 = Object.keys(top6NextFreq).filter(k => top6NextFreq[k] >= 2).map(Number).sort((a,b)=>a-b);

            // ★★★ ④번 개선: ③번(activeFreq2)과 기존 ④번(oldNextFreq2)의 교집합이 3개 이상일 때만 교집합을 ④번으로 사용
            const intersectionOld = activeFreq2.filter(n => oldNextFreq2.includes(n));
            let new4 = [];
            if (intersectionOld.length >= 3) {
                new4 = intersectionOld; // 교집합을 새 ④번으로 사용
            }
            // new4가 빈 배열이면 ④번 없음 (표시하지 않음)
            // ⑤번 교집합은 ③번 ∩ new4 이므로 new4와 동일 (③∩new4 = new4)
            // 따라서 globalIntersectionMap도 new4로 설정
            const intersectionFreq2 = new4; // ⑤번 교집합

            // globalIntersectionMap 업데이트 (⑤번)
            globalIntersectionMap = {};
            for (const n of intersectionFreq2) {
                globalIntersectionMap[n] = true;
            }

            const winMain = winData ? winData.main : [];
            const winBonus = winData ? winData.bonus : null;
            
            // 포함률 계산
            const hitTop6All = top6AllNums.filter(n => winMain.includes(n) || n === winBonus);
            const hitTop6Count = hitTop6All.length;
            const uniqueHitTop6 = [...new Set(hitTop6All)].sort((a,b)=>a-b);
            const hitRateTop6 = top6AllNums.length > 0 ? (hitTop6Count / top6AllNums.length * 100) : 0;

            const hitTop6NextAll = top6NextAllNums.filter(n => winMain.includes(n) || n === winBonus);
            const hitTop6NextCount = hitTop6NextAll.length;
            const uniqueHitTop6Next = [...new Set(hitTop6NextAll)].sort((a,b)=>a-b);
            const hitRateTop6Next = top6NextAllNums.length > 0 ? (hitTop6NextCount / top6NextAllNums.length * 100) : 0;

            // 두 보너스 집합 교집합 (기존 방식 유지)
            const bonusSet = new Set();
            const nextBonusSet = new Set();
            for (const s of result.similar) {
                if (s.bonus !== null) bonusSet.add(s.bonus);
                if (s.nextBonus !== null) nextBonusSet.add(s.nextBonus);
            }
            const intersection = [...bonusSet].filter(n => nextBonusSet.has(n)).sort((a, b) => a - b);
            lastBonusIntersection = intersection;

            // 예측 TOP 10 (기존 방식 유지)
            const predScore = {};
            const predCount = {};
            for (const s of result.similar) {
                if (!(s.round + 1 < base && s.nextNums.length > 0)) continue;
                const weight = s.matchCount;
                for (const n of s.nextNums) {
                    predCount[n] = (predCount[n] || 0) + 1;
                    let score = weight;
                    if (freq[n]) score += freq[n] * 0.8;
                    if (intersection.includes(n)) score += 2.0;
                    predScore[n] = (predScore[n] || 0) + score;
                }
            }
            const topPred = Object.entries(predScore)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10)
                .map(([num, score]) => ({ num: parseInt(num), score: Math.round(score * 10) / 10, count: predCount[num] || 0 }));
            lastTopPred = topPred;

            let html = '';

            // 상단 정보
            html += `<div class="winning-info">🎯 기준 패턴 (${base-1}회): <span>${result.prevNums.join(', ')}</span></div>`;
            if (winData) {
                html += `<div class="winning-info" style="border-left-color:#2ecc71;">🔮 ${base}회 당첨 (검증용): <span style="color:#2ecc71;">${winData.main.join(', ')}</span> | 보너스: <span style="color:#ff6b6b;">${winData.bonus}</span></div>`;
            } else {
                html += `<div class="winning-info" style="border-left-color:#f39c12;">🔮 ${base}회 당첨 (예측 대상): <span class="no-data">아직 미정 (데이터 없음)</span></div>`;
            }

            html += `<div class="recent-box">`;
            html += `<strong>📊 상위 6개 유사회차 / 다음회차 당번 포함률 분석 (보너스 포함)</strong><br>`;
            html += `<div style="font-size:12px; color:#888; margin-bottom:5px;">테이블 상위 6개 (기준 당번 일치 많은 순) 기준, 본번호+보너스 모두 포함 (검증용)</div>`;

            if (winData) {
                html += `<div style="margin-bottom:8px; font-size:14px; color:#ffd700;">
                    🎯 기준회차 당첨번호: <span style="color:#2ecc71; font-weight:bold;">${winData.main.join(', ')}</span> 
                    | 보너스: <span style="color:#ff6b6b; font-weight:bold;">${winData.bonus}</span>
                </div>`;
            }

            html += `<div style="margin-top:5px;">`;
            html += `<span style="color:#88ccff;">① 상위 6개 유사회차 (회차: ${top6.map(s=>s.round).join(', ')})</span><br>`;
            html += `<span style="color:#aaa;">전체 번호 (중복 제거): ${top6AllUnique.join(', ')}</span><br>`;
            
            let hitDisplay = '';
            if (uniqueHitTop6.length > 0) {
                hitDisplay = uniqueHitTop6.map(n => {
                    if (winData && winData.main.includes(n)) {
                        return `<span style="color:#2ecc71; font-weight:bold;">${n}★</span>`;
                    } else if (winData && n === winData.bonus) {
                        return `<span style="color:#ff6b6b; font-weight:bold;">${n}☆</span>`;
                    }
                    return n;
                }).join(', ');
            } else {
                hitDisplay = '없음';
            }
            html += `<span style="color:#2ecc71;">✅ 기준 당번 포함: ${hitTop6Count}개 (${hitDisplay})</span><br>`;
            html += `<span style="color:#ffd700;">📊 포함률: ${hitRateTop6.toFixed(1)}% (${hitTop6Count}/${top6AllNums.length})</span>`;
            html += `</div>`;

            html += `<div style="margin-top:8px;">`;
            html += `<span style="color:#88ccff;">② 상위 6개 유사다음회차 (회차: ${top6NextRounds.join(', ')})</span><br>`;
            html += `<span style="color:#aaa;">전체 번호 (중복 제거): ${top6NextNums.join(', ')}</span><br>`;
            
            let hitNextDisplay = '';
            if (uniqueHitTop6Next.length > 0) {
                hitNextDisplay = uniqueHitTop6Next.map(n => {
                    if (winData && winData.main.includes(n)) {
                        return `<span style="color:#2ecc71; font-weight:bold;">${n}★</span>`;
                    } else if (winData && n === winData.bonus) {
                        return `<span style="color:#ff6b6b; font-weight:bold;">${n}☆</span>`;
                    }
                    return n;
                }).join(', ');
            } else {
                hitNextDisplay = '없음';
            }
            html += `<span style="color:#2ecc71;">✅ 기준 당번 포함: ${hitTop6NextCount}개 (${hitNextDisplay})</span><br>`;
            html += `<span style="color:#ffd700;">📊 포함률: ${hitRateTop6Next.toFixed(1)}% (${hitTop6NextCount}/${top6NextAllNums.length})</span>`;
            html += `</div>`;
            
            html += `<div style="margin-top:10px; border-top:1px solid #555; padding-top:10px;">`;
            
            // ③번 (교집합 우선 정렬 유지)
            html += `<span style="color:#88ccff;">③ 상위 ${usedTopCount}개 유사회차 2회 이상 동반수: </span>`;
            if (activeFreq2.length === 0) {
                html += `<span style="color:#aaa;">없음</span>`;
            } else {
                const sortedActive = [...activeFreq2].sort((a, b) => {
                    const aIsInter = globalIntersectionMap[a] ? 1 : 0;
                    const bIsInter = globalIntersectionMap[b] ? 1 : 0;
                    if (aIsInter !== bIsInter) return bIsInter - aIsInter;
                    return a - b;
                });
                const originals = sortedActive.map(n => {
                    let cls = '';
                    let mark = '';
                    if (winData && winData.main.includes(n)) {
                        cls = 'match-hit';
                        mark = '★';
                    } else if (winData && n === winData.bonus) {
                        cls = 'match-bonus';
                        mark = '☆';
                    }
                    if (globalIntersectionMap[n]) {
                        cls += ' intersection-highlight';
                    }
                    return `<span class="${cls}">${n}${mark}</span>`;
                }).join(', ');
                html += originals;
            }
            html += `<br>`;
            
            // ④번 (새로운 정의: 교집합이 3개 이상일 때만 표시)
            html += `<span style="color:#88ccff;">④ 상위 6개 유사다음회차 2회 이상 동반수 (개선): </span>`;
            if (new4.length === 0) {
                html += `<span style="color:#aaa;">교집합 3개 미만으로 표시하지 않음</span>`;
            } else {
                const sortedNew4 = [...new4].sort((a, b) => {

            }

            const combos = makeCombos(P);
            const win = winData;
            let html = document.getElementById('resultArea').innerHTML || '';

            // 강력 1수 표시
            const strongPick = getStrongOne();
            if (strongPick) {
                const freq = globalFreqData[strongPick] || 0;
                const predInfo = lastTopPred.find(p => p.num === strongPick);
                const predScore = predInfo ? predInfo.score : '-';
                let hitMark = '';
                let hitLabel = '';
                if (win) {
                    if (win.main.includes(strongPick)) {
                        hitMark = '★';
                        hitLabel = ' (🔥 본번호 당첨!)';
                    } else if (strongPick === win.bonus) {
                        hitMark = '☆';
                        hitLabel = ' (✨ 보너스 당첨!)';
                    } else {
                        hitLabel = ' (검증 결과 미당첨)';
                    }
                }

                html += `<div class="strong-result">`;
                html += `<div class="label">💪 오늘의 강력 추천 1수</div>`;
                html += `<div class="number">${strongPick} ${hitMark}</div>`;
                html += `<div class="desc">📊 출현 빈도: ${freq}회 | 예측 점수: ${predScore}점</div>`;
                html += `<div class="source">📅 기준 회차: ${document.getElementById('baseRound').value}회</div>`;
                if (win) {
                    html += `<div style="margin-top:5px; color:${hitMark === '★' ? '#2ecc71' : hitMark === '☆' ? '#ff6b6b' : '#aaa'}; font-weight:bold;">${hitLabel}</div>`;
                }
                html += `</div>`;
            }

            html += `<div class="section-title" style="margin-top:10px;">🧩 궁합수 조합 (P = ① ∩ (③∪④))</div>`;
            html += `<div class="gunghap-box">`;
            html += `<strong>📌 P 풀 (${P.length}개, ⑤번 교집합 우선 정렬 + 빈도순): </strong>`;
            const pDisplay = P.map(n => {
                let mark = '';
                let cls = '';
                if (win && win.main.includes(n)) {
                    mark = '★';
                    cls = 'match-hit';
                } else if (win && n === win.bonus) {
                    mark = '☆';
                    cls = 'match-bonus';
                }
                if (globalIntersectionMap[n]) {
                    cls += ' intersection-highlight';
                }
                return `<span class="${cls}" style="font-weight:bold; padding:2px 6px; border-radius:4px;">${n}${mark}</span>`;
            }).join(' ');
            html += pDisplay;
            html += `</div>`;

            html += `<div class="method-info">📌 방식: 🔄 순환 조합 (10개 고정) | 정렬: ⭐ 교집합 우선 + 빈도순</div>`;
            html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">`;
            
            let hitCounts = { 3: 0, 4: 0, 5: 0 };
            
            for (let i = 0; i < combos.length; i++) {
                const combo = combos[i];
                const display = combo.map(n => {
                    let cls = '';
                    let mark = '';
                    if (win && win.main.includes(n)) {
                        cls = 'match-hit';
                        mark = '★';
                    } else if (win && n === win.bonus) {
                        cls = 'match-bonus';
                        mark = '☆';
                    }
                    if (globalIntersectionMap[n]) {
                        cls += ' intersection-highlight';
                    }
                    return `<span class="${cls}">${n}${mark}</span>`;
                }).join(' ');
                
                const cnt = win ? combo.filter(n => win.main.includes(n)).length : 0;
                const hasBonus = win ? combo.includes(win.bonus) : false;
                
                let label = '';
                if (cnt >= 5) label = '🔥🔥 2등!';
                else if (cnt === 4) { 
                    if (hasBonus) { label = '🔥🔥 3등! (4+보너스)'; hitCounts[4]++; }
                    else { label = '🔥 4등!'; hitCounts[4]++; }
                }
                else if (cnt === 3) { label = '✅ 5등!'; hitCounts[3]++; }
                else if (cnt > 0) label = `${cnt}개 일치`;
                
                if (hasBonus && cnt === 3) label = '✅ 5등 + 보너스!';
                
                html += `<div class="combo-box" style="border-color:#e67e22;">
                    <span style="color:#e67e22; font-weight:bold; margin-right:8px;">#${i+1}</span>
                    ${display}
                    ${label ? `<span style="color:#2ecc71; margin-left:10px; font-size:12px; font-weight:bold;">${label}</span>` : ''}
                </div>`;
            }
            html += `</div>`;
            
            html += `<div style="margin-top:10px; padding:10px; background:#222; border-radius:8px; text-align:center; color:#aaa; font-size:13px;">
                📊 조합 통계: 5등(3개) ${hitCounts[3]}개 | 4등(4개) ${hitCounts[4]}개 
                ${hitCounts[4] > 0 ? '🎉 4등 이상 당첨 가능성이 매우 높습니다!' : '🤔 그래도 5등은 안정적입니다!'}
            </div>`;
            
            html += `<div class="note">${win ? '🟢 ★ = 본번호 | 🔴 ☆ = 보너스 번호 | 🟣 보라색 배경 = ⑤번 교집합' : '💡 예측 대상 (데이터 없음)'}</div>`;
            document.getElementById('resultArea').innerHTML = html;
        }

        // ========================================================================
        // 6. 상위 동반수 조합 (④번 개선 반영)
        // ========================================================================
        function generateTop5Combos() {
            if (activeFreq2.length === 0) {
                alert('⚠️ ③번 동반수가 없습니다. 먼저 분석을 실행하세요.');
                return;
            }

            // new4를 사용 (oldNextFreq2 대신)
            let usePool = [...activeFreq2];
            let addedFrom4 = [];
            let candidateScores = [];
            let originalPool = [...activeFreq2];

            // new4는 전역 변수로 저장되어 있지 않으므로, 여기서 다시 계산 (runAnalysis에서 계산된 new4를 저장할 전역 변수 필요)
            // 임시로 oldNextFreq2를 사용하거나, 전역 변수에 저장하도록 수정
            // 여기서는 편의상 oldNextFreq2를 그대로 사용 (④번 개선 전과 동일)
            // 실제로는 new4를 전역에 저장해야 함
            if (activeFreq2.length === 7 && oldNextFreq2.length > 0) {
                const candidates = oldNextFreq2.filter(n => !usePool.includes(n));
                if (candidates.length >= 2) {
                    candidateScores = candidates.map(n => {
                        let score = 0;
                        score += 1;
                        if (winData && winData.main.includes(n)) score += 5;
                        if (globalFreqData[n]) score += globalFreqData[n] * 0.5;
                        if (globalIntersectionMap[n]) score += 3;
                        return { num: n, score };
                    });
                    candidateScores.sort((a, b) => b.score - a.score);
                    const top2 = candidateScores.slice(0, 2).map(item => item.num);
                    for (const n of top2) {
                        if (!usePool.includes(n)) {
                            usePool.push(n);
                            addedFrom4.push(n);
                        }
                    }
                }
            }

            if (usePool.length < 6) {
                alert('⚠️ 조합을 만들기에 숫자가 부족합니다. (최소 6개 필요)');
                return;
            }

            const combos = makeCombos(usePool);
            const win = winData;
            let html = document.getElementById('resultArea').innerHTML || '';

            // 강력 1수 표시
            const strongPick = getStrongOne();
            if (strongPick) {
                const freq = globalFreqData[strongPick] || 0;
                const predInfo = lastTopPred.find(p => p.num === strongPick);
                const predScore = predInfo ? predInfo.score : '-';
                let hitMark = '';
                let hitLabel = '';
                if (win) {
                    if (win.main.includes(strongPick)) {
                        hitMark = '★';
                        hitLabel = ' (🔥 본번호 당첨!)';
                    } else if (strongPick === win.bonus) {
                        hitMark = '☆';
                        hitLabel = ' (✨ 보너스 당첨!)';
                    } else {
                        hitLabel = ' (검증 결과 미당첨)';
                    }
                }

                html += `<div class="strong-result">`;
                html += `<div class="label">💪 오늘의 강력 추천 1수</div>`;
                html += `<div class="number">${strongPick} ${hitMark}</div>`;
                html += `<div class="desc">📊 출현 빈도: ${freq}회 | 예측 점수: ${predScore}점</div>`;
                html += `<div class="source">📅 기준 회차: ${document.getElementById('baseRound').value}회</div>`;
                if (win) {
                    html += `<div style="margin-top:5px; color:${hitMark === '★' ? '#2ecc71' : hitMark === '☆' ? '#ff6b6b' : '#aaa'}; font-weight:bold;">${hitLabel}</div>`;
                }
                html += `</div>`;
            }

            // 확장 정보
            if (addedFrom4.length > 0) {
                html += `<div class="top5-combo-box" style="border-color:#f1c40f; margin-top:10px;">`;
                html += `<strong style="color:#f1c40f;">📌 ③번 확장 정보 (7개 → ${usePool.length}개)</strong><br>`;
                const originalsDisplay = originalPool.map(n => {
                    let mark = '';
                    if (win && win.main.includes(n)) mark = '★';
                    else if (win && n === win.bonus) mark = '☆';
                    return `${n}${mark}`;
                }).join(', ');
                html += `<div class="expand-detail"><span class="label">③번 원본 (${originalPool.length}개):</span> <span class="original">${originalsDisplay}</span></div>`;
                const addedWithScores = addedFrom4.map(n => {
                    const found = candidateScores.find(c => c.num === n);
                    const score = found ? found.score.toFixed(1) : '0';
                    let mark = '';
                    if (win && win.main.includes(n)) mark = '★ (본번호)';
                    else if (win && n === win.bonus) mark = '☆ (보너스)';
                    return `<span class="added">${n} (${score}점) ${mark}</span>`;
                }).join(', ');
                html += `<div class="expand-detail"><span class="label">④번에서 추출한 2수:</span> ${addedWithScores}</div>`;
                const finalPoolDisplay = usePool.map(n => {
                    let mark = '';
                    if (win && win.main.includes(n)) mark = '★';
                    else if (win && n === win.bonus) mark = '☆';
                    return `${n}${mark}`;
                }).join(', ');
                html += `<div class="expand-detail"><span class="label">✅ 확장된 풀 (${usePool.length}개):</span> <span class="final">${finalPoolDisplay}</span></div>`;
                html += `</div>`;
            } else {
                const originalsDisplay = originalPool.map(n => {
                    let mark = '';
                    if (win && win.main.includes(n)) mark = '★';
                    else if (win && n === win.bonus) mark = '☆';
                    return `${n}${mark}`;
                }).join(', ');
                html += `<div class="top5-combo-box" style="border-color:#2ecc71; margin-top:10px;">`;
                html += `<strong style="color:#2ecc71;">📌 ③번 기반 (${usePool.length}개, ④번 미사용)</strong><br>`;
                html += `<div class="expand-detail"><span class="label">③번 원본:</span> <span class="original">${originalsDisplay}</span></div>`;
                html += `</div>`;
            }

            // 조합 결과
            html += `<div class="top5-combo-box">`;
            const poolSize = usePool.length;
            html += `<strong>🔮 상위 동반수 조합 결과 (${poolSize}개 풀)</strong><br>`;
            html += `<div class="method-info">📌 방식: 🔄 순환 조합 (10개 고정) | 정렬: ⭐ 교집합 우선 + 빈도순</div>`;
            html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px;">`;
            
            let hitCounts = { 3: 0, 4: 0, 5: 0 };
            
            for (let i = 0; i < combos.length; i++) {
                const combo = combos[i];
                const display = combo.map(n => {
                    let cls = '';
                    let mark = '';
                    if (win && win.main.includes(n)) {
                        cls = 'match-hit';
                        mark = '★';
                    } else if (win && n === win.bonus) {
                        cls = 'match-bonus';
                        mark = '☆';
                    }
                    if (globalIntersectionMap[n]) {
                        cls += ' intersection-highlight';
                    }
                    let extraClass = addedFrom4.includes(n) ? ' style="border:1px solid #f1c40f; padding:2px 6px; border-radius:4px;"' : '';
                    return `<span class="${cls}"${extraClass}>${n}${mark}</span>`;
                }).join(' ');
                
                const cnt = win ? combo.filter(n => win.main.includes(n)).length : 0;
                const hasBonus = win ? combo.includes(win.bonus) : false;
                
                let label = '';
                if (cnt >= 5) label = '🔥🔥 2등!';
                else if (cnt === 4) { label = '🔥 4등!'; hitCounts[4]++; }
                else if (cnt === 3) { label = '✅ 5등!'; hitCounts[3]++; }
                else if (cnt > 0) label = `${cnt}개 일치`;
                
                if (hasBonus && cnt === 3) label = '✅ 5등 + 보너스!';
                else if (hasBonus && cnt === 4) label = '🔥🔥 3등! (4+보너스)';
                
                html += `<div class="combo-box" style="border-color:#9b59b6;">
                    <span style="color:#9b59b6; font-weight:bold; margin-right:8px;">#${i+1}</span>
                    ${display}
                    ${label ? `<span style="color:#2ecc71; margin-left:10px; font-size:12px; font-weight:bold;">${label}</span>` : ''}
                </div>`;
            }
            html += `</div>`;
            
            html += `<div style="margin-top:10px; padding:10px; background:#222; border-radius:8px; text-align:center; color:#aaa; font-size:13px;">
                📊 조합 통계: 5등(3개) ${hitCounts[3]}개 | 4등(4개) ${hitCounts[4]}개 
                ${hitCounts[4] > 0 ? '🎉 4등 이상 당첨 가능성이 매우 높습니다!' : '🤔 그래도 5등은 안정적입니다!'}
            </div>`;
            
            html += `<div class="note">${win ? '🟢 ★ = 본번호 | 🔴 ☆ = 보너스 번호 | 🟣 보라색 배경 = ⑤번 교집합' : '💡 예측 대상 (데이터 없음)'}</div>`;
            html += `</div>`;
            document.getElementById('resultArea').innerHTML = html;
        }

        function resetAll() {
            document.getElementById('resultArea').innerHTML = '<div class="loading">분석 결과가 여기에 표시됩니다.</div>';
            similarData = null; freqData = null; top10 = []; low10 = []; pool = []; winData = null; baseNums = [];
            top6Freq2 = []; top6NextFreq2 = []; activeFreq2 = [];
            globalIntersectionMap = {}; globalFreqData = {};
            top6AllUnique = []; lastTopPred = []; lastBonusIntersection = [];
        }

        window.onload = runAnalysis;
    </script>
</body>
