        .filter-group label { color: #ffd700; font-size: 12px; font-weight: bold; }

        button.secondary { background: #555; color: #fff; }
        button.secondary:hover { background: #777; }
        .result-area { background: #1a1a1a; border: 2px solid #ffd700; border-radius: 15px; padding: 20px; margin-top: 20px; overflow-x: auto; }
        .section-title { color: #ffd700; font-size: 18px; font-weight: bold; margin: 15px 0 10px 0; }
        .winning-info { background: #2a2a2a; border-left: 4px solid #ff6b6b; padding: 10px 15px; border-radius: 8px; margin: 10px 0; }
        .winning-info span { color: #ff6b6b; font-weight: bold; font-size: 18px; }
        .info-box { background: #1a2a2a; border-left: 4px solid #3498db; padding: 8px 15px; border-radius: 8px; margin: 5px 0; font-size: 13px; color: #88ccff; }
        .pool-box { background: #1a2a1a; border: 2px solid #2ecc71; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .combo-box { background: #1a2a1a; border: 1px solid #2ecc71; border-radius: 10px; padding: 10px 15px; margin: 5px 0; display: flex; flex-wrap: wrap; align-items: center; }
        .combo-box span { display: inline-block; background: #333; padding: 2px 10px; border-radius: 20px; margin: 2px 4px; font-size: 13px; }
        .match-hit { color: #ffd700; font-weight: bold; background: rgba(255,215,0,0.25); border-radius: 4px; padding: 2px 6px; }
        .match-bonus { color: #ff6b6b; font-weight: bold; background: rgba(255,107,107,0.25); border-radius: 4px; padding: 2px 6px; }
        .loading { text-align: center; padding: 40px; color: #aaa; }
        .note { font-size: 11px; color: #666; margin-top: 5px; }
        .freq-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .freq-item { display: inline-flex; align-items: center; gap: 5px; background: #1a1a1a; padding: 3px 12px; border-radius: 20px; border: 1px solid #333; font-size: 14px; }
        .freq-item .num { font-weight: bold; min-width: 24px; text-align: center; color: #fff; }
        .freq-item .count { color: #ffd700; font-size: 12px; }
        .freq-item .bar { display: inline-block; width: 30px; height: 4px; background: #333; border-radius: 2px; margin-left: 4px; }
        .freq-item .bar-inner { display: block; height: 100%; background: #ffd700; border-radius: 2px; }
        .winner-main { color: #2ecc71 !important; }
        .winner-bonus { color: #ff6b6b !important; }
        .freq-section { margin-top: 15px; }
        .freq-section-title { color: #ffd700; font-size: 15px; font-weight: bold; margin-bottom: 5px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 30px; font-weight: bold; font-size: 11px; }
        .badge-4 { background: #ffd700; color: #000; }
        .badge-5 { background: #2ecc71; color: #000; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 10px 0; }
        th { background: #ffd700; color: #000; padding: 6px 4px; text-align: center; }
        td { padding: 5px 4px; border-bottom: 1px solid #333; text-align: center; }
        .round-col { color: #ffd700; font-weight: bold; }
        .bonus-col { color: #ff6b6b; font-weight: bold; }

        // ========================================================================
        // 2. 핵심 함수
        // ========================================================================
        function getWinning(round) {
            const row = DATA.find(r => r[0] === round);
            return row ? { main: row.slice(1, 7), bonus: row[7] } : null;
        }

        function findSimilar(baseRound, startRound, minMatch) {
            const prev = getWinning(baseRound - 1);
            if (!prev) return { similar: [], prevNums: [] };
            const baseNums = prev.main;
            const result = [];
            for (const row of DATA) {
                const r = row[0];
                if (r >= baseRound || r < startRound) continue;
                const nums = row.slice(1, 7);
                const matched = nums.filter(n => baseNums.includes(n));
                if (matched.length >= minMatch) {
                    const next = getWinning(r + 1);
                    result.push({
                        round: r,
                        nums: nums,
                        bonus: row[7],
                        matched: matched,
                        matchCount: matched.length,
                        nextNums: next ? next.main : [],
                        nextBonus: next ? next.bonus : null
                    });
                }
            }
            result.sort((a, b) => b.matchCount - a.matchCount);
            return { similar: result, prevNums: baseNums };
        }

        function calcFreq(similar) {
            const f = {};
            for (let i = 1; i <= 45; i++) f[i] = 0;
            for (const s of similar) {
                for (const n of s.nextNums) f[n] = (f[n] || 0) + 1;
                if (s.nextBonus !== null) f[s.nextBonus] = (f[s.nextBonus] || 0) + 1;
            }
            return f;
        }

        function getTop(freq, n) {
            return Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, n).map(([k]) => parseInt(k));
        }

        function getLow(freq, n) {
            return Object.entries(freq).sort((a, b) => a[1] - b[1]).slice(0, n).map(([k]) => parseInt(k));
        }

        function getAbove2(freq) {
            return Object.entries(freq).filter(([k, v]) => v >= 2).map(([k]) => parseInt(k)).sort((a, b) => a - b);
        }

        // 3. 상태

                return;

            top10 = getTop(freq, 10);
            low10 = getLow(freq, 10);
            pool = getAbove2(freq);
            winData = getWinning(base);

            for (const s of result.similar) {
                html += `<tr>
                    <td class="round-col">${s.round}</td>
                    <td>${s.nums.join(', ')}</td>
                    <td class="bonus-col">${s.bonus}</td>
                    <td><span class="badge badge-4">${s.matchCount}개</span></td>
                    <td class="round-col" style="color:#2ecc71;">${s.round+1}</td>
                    <td>${s.nextNums.join(', ')}</td>
                    <td class="bonus-col">${s.nextBonus !== null ? s.nextBonus : '-'}</td>
                </tr>`;
            }
            html += `</table>`;

            // 2회 이상 풀
            const poolColored = pool.map(n => {
                let cls = '';
                if (winData && winData.main.includes(n)) cls = 'winner-main';
                else if (winData && n === winData.bonus) cls = 'winner-bonus';
                return `<span class="${cls}">${n}</span>`;
            }).join(', ');
            html += `<div class="pool-box">✅ <strong>2회 이상 등장 (${pool.length}개):</strong> ${poolColored}</div>`;

            // 고빈도 TOP10
            const maxF = Math.max(...Object.values(freq));
            html += `<div class="freq-section"><div class="freq-section-title">📊 고빈도 TOP 10</div><div class="freq-container">`;
            for (const n of top10) {
                const c = freq[n] || 0;
                const pct = (c / maxF * 100).toFixed(0);
                let cls = '';
                if (winData && winData.main.includes(n)) cls = 'winner-main';
                else if (winData && n === winData.bonus) cls = 'winner-bonus';
                html += `<div class="freq-item"><span class="num ${cls}">${n}</span><span class="count">${c}</span><span class="bar"><span class="bar-inner" style="width:${pct}%;"></span></span></div>`;
            }
            html += `</div></div>`;

            // 저빈도 TOP10
            html += `<div class="freq-section"><div class="freq-section-title">📊 저빈도 TOP 10</div><div class="freq-container">`;
            for (const n of low10) {
                const c = freq[n] || 0;
                const pct = (c / maxF * 100).toFixed(0);
                let cls = '';
                if (winData && winData.main.includes(n)) cls = 'winner-main';
                else if (winData && n === winData.bonus) cls = 'winner-bonus';
                html += `<div class="freq-item"><span class="num ${cls}">${n}</span><span class="count">${c}</span><span class="bar"><span class="bar-inner" style="width:${pct}%;"></span></span></div>`;
            }
            html += `</div></div>`;

            html += `<div class="note">${winData ? '초록색 = 본번호 | 빨간색 = 보너스' : '🔮 1234회는 예측 대상 (아직 데이터 없음)'}</div>`;

            document.getElementById('resultArea').innerHTML = html;
        }

        // ========================================================================
        // 5. 조합 생성 (TOP10만 사용, 5개 순차 + 1개 TOP10 내 랜덤)
        // ========================================================================
        function generateCombos() {
            // 1. TOP10 데이터가 없으면 경고
            if (top10.length === 0) {
                alert('⚠️ TOP10 데이터가 없습니다. 먼저 분석을 실행하세요.');
                return;
            }

            // 2. 기본 재료: TOP10 (보통 10개)
            const basePool = [...top10];
            
            // (안전장치) 혹시 TOP10이 6개 미만이면 pool에서 보충 (거의 발생 안 함)
            let usePool = [...basePool];
            if (usePool.length < 6) {
                const extra = pool.filter(n => !usePool.includes(n));
                while (usePool.length < 6 && extra.length > 0) {
                    usePool.push(extra.shift());
                }
            }

            // 3. 🔥 조합 생성: TOP10에서 5개 순차적 + 나머지 1개는 TOP10 내에서 랜덤
            const combos = [];
            const usedSet = new Set();

            for (let i = 0; i < 10; i++) {
                // ① TOP10에서 5개를 순차적으로 선택 (슬라이딩 윈도우: i, i+1, i+2, i+3, i+4)
                const selectedFive = [];
                const fixedIndices = [];
                for (let j = 0; j < 5; j++) {
                    const idx = (i + j) % basePool.length;
                    fixedIndices.push(idx);
                    selectedFive.push(basePool[idx]);
                }

                // ② TOP10에서 위에서 고른 5개를 제외한 나머지 5개의 인덱스 구하기
                const remainingIndices = [];
                for (let k = 0; k < basePool.length; k++) {
                    if (!fixedIndices.includes(k)) {
                        remainingIndices.push(k);
                    }
                }

                // ③ 나머지 5개 중에서 1개를 랜덤으로 선택
                const randomIndex = remainingIndices[Math.floor(Math.random() * remainingIndices.length)];
                let selectedOne = basePool[randomIndex];

                // ④ 합쳐서 6개 조합 생성 후 오름차순 정렬
                let combo = [...selectedFive, selectedOne].sort((a, b) => a - b);
                let key = combo.join(',');

                // ⑤ 중복 체크: 만약 중복되면 나머지 5개 중에서 다른 숫자로 재시도 (최대 10번)
                let attempts = 0;
                while (usedSet.has(key) && attempts < 10) {
                    attempts++;
                    const newRandomIndex = remainingIndices[Math.floor(Math.random() * remainingIndices.length)];
                    const newOne = basePool[newRandomIndex];
                    combo = [...selectedFive, newOne].sort((a, b) => a - b);
                    key = combo.join(',');
                }

                // ⑥ 중복이 해결되었으면 저장
                if (!usedSet.has(key)) {
                    usedSet.add(key);
                    combos.push(combo);
                } else {
                    // 극히 드문 경우지만, 그래도 중복이면 남은 것 중 첫 번째로 강제 저장 (방어코드)
                    const fallbackOne = basePool[remainingIndices[0]];
                    const fallbackCombo = [...selectedFive, fallbackOne].sort((a, b) => a - b);
                    const fallbackKey = fallbackCombo.join(',');
                    if (!usedSet.has(fallbackKey)) {
                        usedSet.add(fallbackKey);
                        combos.push(fallbackCombo);
                    }
                }
            }

            // 4. 혹시 모자란 게 있으면 (거의 없음) 순수 TOP10 앞에서부터 채우기
            while (combos.length < 10) {
                const startIdx = combos.length % basePool.length;
                const fallbackCombo = [];
                for (let j = 0; j < 6; j++) {
                    fallbackCombo.push(basePool[(startIdx + j) % basePool.length]);
                }
                fallbackCombo.sort((a, b) => a - b);
                const key = fallbackCombo.join(',');
                if (!usedSet.has(key)) {
                    usedSet.add(key);
                    combos.push(fallbackCombo);
                } else {
                    break;
                }
            }

            // 5. UI에 결과 출력
            const base = parseInt(document.getElementById('baseRound').value) || 1234;
            const win = getWinning(base);
            
            let html = document.getElementById('resultArea').innerHTML || '';
            html += `<div class="section-title" style="margin-top:20px;">🎯 추천 조합 (TOP10: ${basePool.join(', ')})</div>`;
            html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">`;
            
            let hitCounts = { 3: 0, 4: 0, 5: 0 };
            
            for (let i = 0; i < combos.length; i++) {
                const combo = combos[i];
                const display = combo.map(n => {
                    let cls = '';
                    if (win && win.main.includes(n)) cls = 'match-hit';
                    else if (win && n === win.bonus) cls = 'match-bonus';
                    return `<span class="${cls}">${n}</span>`;
                }).join(' ');
                
                const cnt = win ? combo.filter(n => win.main.includes(n)).length : 0;
                const hasBonus = win ? combo.includes(win.bonus) : false;
                
                let label = '';
                if (cnt >= 5) label = '🔥🔥 2등!';
                else if (cnt === 4) { label = '🔥 4등!'; hitCounts[4]++; }
                else if (cnt === 3) { label = '✅ 5등!'; hitCounts[3]++; }
                else if (cnt > 0) label = `${cnt}개 일치`;
                
                if (hasBonus && cnt === 3) label = '✅ 5등 + 보너스!';
                else if (hasBonus && cnt === 4) label = '🔥🔥 3등! (4+보너스)';
                
                html += `<div class="combo-box">
                    <span style="color:#ffd700; font-weight:bold; margin-right:8px;">#${i+1}</span>
                    ${display}
                    ${label ? `<span style="color:#2ecc71; margin-left:10px; font-size:12px; font-weight:bold;">${label}</span>` : ''}
                </div>`;
            }
            html += `</div>`;
            
            // 통계 요약
            html += `<div style="margin-top:10px; padding:10px; background:#222; border-radius:8px; text-align:center; color:#aaa; font-size:13px;">
                📊 조합 통계: 5등(3개) ${hitCounts[3]}개 | 4등(4개) ${hitCounts[4]}개 
                ${hitCounts[4] > 0 ? '🎉 4등 이상 당첨 가능성이 매우 높습니다!' : '🤔 그래도 5등은 안정적입니다!'}
            </div>`;
            
            html += `<div class="note">🟡 노란색 = 본번호 | 🔴 빨간색 = 보너스 (모든 숫자는 TOP10 내에서만 선택됨)</div>`;
            document.getElementById('resultArea').innerHTML = html;
        }

        function resetAll() {
            document.getElementById('resultArea').innerHTML = '<div class="loading">분석 결과가 여기에 표시됩니다.</div>';
            similarData = null; freqData = null; top10 = []; low10 = []; pool = []; winData = null;
        }

        window.onload = runAnalysis;
    </script>
</body>
</html>
