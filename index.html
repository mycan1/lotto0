        .section-title { color: #ffd700; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        textarea { width: 100%; height: 200px; background: #2a2a2a; color: #fff; border: 2px solid #ffd700; border-radius: 15px; padding: 15px; font-size: 13px; font-family: 'Consolas', monospace; margin-bottom: 10px; resize: vertical; }

        button:hover { background: #00e6b8; transform: scale(1.02); box-shadow: 0 0 15px #00e6b8; }
        button.secondary { background: #333; color: #ffd700; border: 1px solid #ffd700; }
        button.secondary:hover { background: #444; color: #00e6b8; border-color: #00e6b8; }
        .filter-panel, .backtest-panel { background: #222; border-radius: 15px; padding: 12px; margin: 10px 0; border: 1px solid #ffd700; }
        .filter-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 8px 0; }
        .filter-item { display: flex; align-items: center; gap: 5px; background: #333; padding: 5px 10px; border-radius: 20px; font-size: 11px; }
        .filter-item input[type="number"] { width: 60px; background: #444; border: 1px solid #ffd700; color: #ffd700; border-radius: 15px; padding: 3px 5px; text-align: center; }
        .filter-item input[type="text"] { width: 150px; background: #444; border: 1px solid #ffd700; color: #ffd700; border-radius: 15px; padding: 3px 8px; }
        .result-section { background: #1a1a1a; border: 3px solid #ffd700; border-radius: 20px; padding: 15px; min-height: 600px; }
        .tab-menu { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #ffd700; padding-bottom: 5px; }
        .tab { padding: 8px 15px; background: #333; color: #aaa; border-radius: 30px 30px 0 0; cursor: pointer; font-size: 12px; font-weight: bold; }
        .tab.active { background: #ffd700; color: #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 15px 0; }
        .stat-card { background: linear-gradient(145deg, #222, #111); border: 1px solid #ffd700; border-radius: 15px; padding: 15px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .stat-label { font-size: 11px; color: #aaa; margin-top: 5px; }
        .groups-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin: 15px 0; max-height: 400px; overflow-y: auto; padding: 5px; }
        .group-card { background: #222; border-left: 5px solid #ffd700; border-radius: 10px; padding: 10px; }
        .group-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 11px; color: #ffd700; }
        .group-numbers { display: flex; flex-wrap: wrap; gap: 3px; }
        .number-badge { display: inline-flex; width: 24px; height: 24px; background: #333; border: 1px solid #ffd700; border-radius: 50%; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; }
        .analysis-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .analysis-table th { background: #ffd700; color: #000; padding: 10px; position: sticky; top: 0; }
        .analysis-table td { padding: 8px; border-bottom: 1px solid #444; }
        .analysis-table tr:hover { background: #333; }
        .rank-1 { background: rgba(255,215,0,0.15); }
        .rank-2 { background: rgba(46,204,113,0.15); }
        .rank-3 { background: rgba(52,152,219,0.15); }
        .score-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 3px; }
        .score-fill { height: 100%; background: #ffd700; border-radius: 2px; }
        .recommend-box { background: linear-gradient(145deg, #1a1a1a, #000); border: 3px solid #ffd700; border-radius: 20px; padding: 20px; margin-top: 20px; }
        .level-badge { display: inline-block; padding: 5px 15px; border-radius: 30px; font-weight: bold; font-size: 12px; margin-right: 10px; }
        .big-number { display: inline-flex; width: 45px; height: 45px; border-radius: 50%; justify-content: center; align-items: center; font-weight: bold; font-size: 16px; margin: 3px; border: 2px solid white; transition: transform 0.2s; }
        .big-number:hover { transform: scale(1.1); box-shadow: 0 0 15px currentColor; }
        .big-number.level-1 { background: #ffd700; color: #000; }
        .big-number.level-2 { background: #2ecc71; color: #000; }
        .big-number.level-3 { background: #3498db; color: #fff; }
        .chart-container { height: 200px; display: flex; align-items: flex-end; gap: 2px; margin: 20px 0; }
        .chart-bar { flex: 1; background: #ffd700; min-height: 2px; border-radius: 3px 3px 0 0; transition: height 0.3s; position: relative; }
        .chart-bar:hover::after { content: attr(data-value); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); background: #000; color: #ffd700; padding: 2px 5px; border-radius: 10px; font-size: 9px; white-space: nowrap; }
        .loading { text-align: center; padding: 40px; color: #ffd700; font-size: 14px; }
        .loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 3px solid #ffd700; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 10px; }

        .backtest-result { background: #1a1a1a; border: 2px solid #2ecc71; border-radius: 15px; padding: 15px; margin-top: 15px; }
        .match-badge { display: inline-block; background: #2ecc71; color: #000; padding: 5px 12px; border-radius: 30px; font-weight: bold; font-size: 14px; }

        .backtest-mode { background: #2a2a2a; border-radius: 10px; padding: 8px; margin-top: 5px; font-size: 11px; color: #aaa; }

    <h1>📊 만능 분석 + 백테스트 (어떤 데이터든 OK)</h1>
    
    <div class="main-container">
        <div class="input-section">
            <div class="section-title">📋 데이터 입력 <span style="font-size:10px; color:#aaa;">(아무 형식이나 OK)</span></div>

            <div class="button-grid">
                <button onclick="analyzeData()">🔍 고급 분석</button>
                <button onclick="clearData()" class="secondary">🗑️ 지우기</button>
                <button onclick="showSample()" class="secondary">📌 샘플</button>
                <button onclick="exportData()" class="secondary">💾 내보내기</button>
                <button onclick="copyResult()" class="secondary">📋 복사</button>
                <button onclick="printReport()" class="secondary">🖨️ 인쇄</button>
            </div>
            
            <div class="filter-panel">
                <div style="color:#ffd700; margin-bottom:8px;">⚙️ 분석 옵션</div>
                <div class="filter-group">
                    <div class="filter-item"><span>최소 그룹 수</span><input type="number" id="minGroups" value="2" min="1" max="10"></div>
                    <div class="filter-item"><span>최대 추천 개수</span><input type="number" id="maxRecommend" value="20" min="5" max="45"></div>
                </div>
                <div class="filter-group">
                    <label class="filter-item"><input type="checkbox" id="weightBySize" checked> 그룹 크기 가중치</label>
                    <label class="filter-item"><input type="checkbox" id="showCorrelation" checked> 연관성 분석</label>
                    <label class="filter-item"><input type="checkbox" id="showChart" checked> 분포 차트</label>
                </div>
                <div class="filter-group">
                    <label class="filter-item"><input type="radio" name="sortMethod" id="sortByCount" checked> 그룹 수 순</label>
                    <label class="filter-item"><input type="radio" name="sortMethod" id="sortByScore"> 종합 점수 순</label>
                    <label class="filter-item"><input type="radio" name="sortMethod" id="sortByNumber"> 숫자 순</label>
                </div>
            </div>
            
            <div class="backtest-panel">
                <div style="color:#ffd700; margin-bottom:8px;">🔁 백테스트 설정</div>
                <div class="filter-group">
                    <div class="filter-item">
                        <span>회차</span>
                        <input type="number" id="backtestRound" value="1233" min="1001" max="1233" onchange="autoFillBacktest()">
                    </div>
                    <div class="filter-item">
                        <span>실제 번호</span>
                        <input type="text" id="backtestNumbers" placeholder="자동" style="width:130px;">
                    </div>
                    <div class="filter-item">
                        <span>보너스</span>
                        <input type="number" id="backtestBonus" value="" min="1" max="45">
                    </div>
                </div>
                <div class="filter-group">
                    <button onclick="runBacktest()" style="flex:1;">🔬 백테스트 실행</button>
                </div>
                <div id="backtestModeInfo" class="backtest-mode">
                    📌 현재 모드: <span class="highlight" id="modeDisplay">대기 중</span>
                </div>
                <div id="backtestResult" style="margin-top:10px; font-size:12px; color:#aaa;">
                    백테스트 결과가 여기에 표시됩니다.
                </div>
            </div>
            
            <div class="drop-hint">📂 텍스트 파일을 드래그하거나 붙여넣기(Ctrl+V)로 데이터를 입력하세요.</div>
        </div>
        
        <div class="result-section">
            <div class="tab-menu">
                <div class="tab active" onclick="switchTab('overview')">📊 종합</div>
                <div class="tab" onclick="switchTab('analysis')">🔍 상세분석</div>
                <div class="tab" onclick="switchTab('groups')">📦 그룹별</div>
                <div class="tab" onclick="switchTab('correlation')">🔄 연관성</div>
                <div class="tab" onclick="switchTab('stats')">📈 통계</div>
            </div>

            <div id="tab-groups" class="tab-content"><div id="groups-content"></div></div>
            <div id="tab-correlation" class="tab-content"><div id="correlation-content"></div></div>
            <div id="tab-stats" class="tab-content"><div id="stats-content"></div></div>
        </div>
    </div>

        // ========== 만능 파싱 (어떤 형식이든 OK) ==========
        function parseAdvancedData(text) {
            if (!text.trim()) return null;

            const lines = text.split('\n');
            const groups = {};
            let currentGroup = '📊 기본 그룹';
            let currentNumbers = [];

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                // 1️⃣ 구분자(: - 등)로 그룹명과 숫자부 분리
                let separatorMatch = line.match(/^([^0-9]*?)\s*[:：\-–—]\s*(.*)$/);
                let groupName = null;
                let numberPart = line;

                if (separatorMatch) {
                    groupName = separatorMatch[1].trim();
                    numberPart = separatorMatch[2].trim();
                } else {
                    // 구분자가 없으면 숫자만 추출해서 현재 그룹에 추가
                    let nums = line.match(/\d+/g)?.map(Number) || [];
                    if (nums.length > 0) {
                        currentNumbers.push(...nums);
                        continue;
                    } else {
                        // 숫자가 없으면 새로운 그룹명으로 인식
                        groupName = line;
                        numberPart = '';
                    }
                }

                // 2️⃣ 숫자부에서 모든 숫자 추출
                let numbers = numberPart.match(/\d+/g)?.map(Number) || [];

                // 3️⃣ 그룹명이 있으면 이전 그룹 저장 후 새 그룹 시작
                if (groupName && groupName.length > 0) {
                    if (currentNumbers.length > 0) {
                        if (!groups[currentGroup]) groups[currentGroup] = [];
                        groups[currentGroup] = [...new Set([...groups[currentGroup], ...currentNumbers])];
                    }
                    currentGroup = groupName;
                    currentNumbers = numbers;
                } else if (numbers.length > 0) {
                    currentNumbers.push(...numbers);
                }
            }

            // 마지막 그룹 저장
            if (currentNumbers.length > 0) {
                if (!groups[currentGroup]) groups[currentGroup] = [];
                groups[currentGroup] = [...new Set([...groups[currentGroup], ...currentNumbers])];
            }

            // 그룹이 없으면 전체를 하나로
            if (Object.keys(groups).length === 0) {
                let allNumbers = text.match(/\d+/g)?.map(Number) || [];
                if (allNumbers.length > 0) {
                    groups['📊 전체 데이터'] = [...new Set(allNumbers)];
                } else {
                    return null;
                }
            }

            // 그룹명 정리
            let cleanedGroups = {};
            for (let [name, numbers] of Object.entries(groups)) {
                let cleanName = name.replace(/[:：\-–—]\s*$/, '').trim();
                if (cleanName.length > 30) cleanName = cleanName.substring(0, 30) + '...';
                if (cleanName === '') cleanName = '📊 그룹';
                cleanedGroups[cleanName] = numbers;
            }

            return cleanedGroups;
        }

        // ========== 분석 엔진 ==========
        function calculateWeights(groups) {
            let weights = {};
            let totalSize = 0;
            for (let [name, numbers] of Object.entries(groups)) {
                weights[name] = numbers.length;
                totalSize += numbers.length;
            }
            if (totalSize > 0) {
                for (let name in weights) weights[name] = weights[name] / totalSize;
            }
            return weights;
        }

        function calculateComprehensiveScore(number, groups, groupWeights, options) {
            let groupCount = number.groups.length;
            let baseScore = groupCount;
            if (options.weightBySize) {
                let weightSum = number.groups.reduce((sum, g) => sum + (groupWeights[g] || 1), 0);
                baseScore += weightSum * 2;
            }
            let diversityBonus = 0;
            let groupTypes = new Set(number.groups.map(g => {
                if (g.includes('AI') || g.includes('인공지능')) return 'ai';
                if (g.includes('통계') || g.includes('분석')) return 'stat';
                if (g.includes('전문가') || g.includes('전문')) return 'expert';
                if (g.includes('추천') || g.includes('최종')) return 'recommend';
                return 'other';
            })).size;
            diversityBonus = (groupTypes - 1) * 0.5;
            let frequencyScore = groupCount / Object.keys(groups).length * 3;
            return baseScore + diversityBonus + frequencyScore;
        }

        function analyzeCorrelation(groups) {
            let numbers = new Set();
            let pairs = {};
            for (let nums of Object.values(groups)) nums.forEach(n => numbers.add(n));
            let numList = Array.from(numbers).sort((a,b) => a-b);
            for (let i = 0; i < numList.length; i++) {
                for (let j = i+1; j < numList.length; j++) {
                    let a = numList[i], b = numList[j];
                    let count = 0;
                    for (let nums of Object.values(groups)) {
                        if (nums.includes(a) && nums.includes(b)) count++;
                    }
                    if (count > 0) pairs[`${a},${b}`] = count;
                }
            }
            return { numbers: numList, pairs };
        }

        function performAnalysis(groups, options) {
            if (!groups || Object.keys(groups).length === 0) return null;

            let groupWeights = calculateWeights(groups);
            let numberGroups = {};
            for (let [groupName, numbers] of Object.entries(groups)) {
                numbers.forEach(n => {
                    if (!numberGroups[n]) numberGroups[n] = [];
                    numberGroups[n].push(groupName);
                });
            }

            let analysis = [];
            for (let [num, grps] of Object.entries(numberGroups)) {
                let uniqueGroups = [...new Set(grps)];
                analysis.push({
                    number: parseInt(num),
                    groups: uniqueGroups,
                    count: uniqueGroups.length,
                    score: calculateComprehensiveScore(
                        {number: parseInt(num), groups: uniqueGroups}, 
                        groups, 
                        groupWeights, 
                        options
                    )
                });
            }

            if (options.sortMethod === 'sortByCount') {
                analysis.sort((a, b) => {
                    if (a.count !== b.count) return b.count - a.count;
                    return b.score - a.score;
                });
            } else if (options.sortMethod === 'sortByScore') {
                analysis.sort((a, b) => b.score - a.score);
            } else {
                analysis.sort((a, b) => a.number - b.number);
            }

            let correlation = analyzeCorrelation(groups);
            let stats = {
                totalGroups: Object.keys(groups).length,
                totalNumbers: analysis.length,
                maxGroupCount: Math.max(...analysis.map(a => a.count)),
                avgGroupCount: (analysis.reduce((sum, a) => sum + a.count, 0) / analysis.length).toFixed(2),
                groupSizes: Object.fromEntries(Object.entries(groups).map(([k,v]) => [k, v.length]))
            };

            return { groups, analysis, correlation, stats, options };
        }

                html += `<tr class="${rowClass}">
                    <td style="text-align:center;">${idx+1}</td>
                    <td style="font-weight:bold; font-size:16px;">${item.number}</td>
                    <td style="text-align:center;"><span class="level-badge" style="padding:2px 8px;">${item.count}</span></td>
                    <td style="text-align:center;">${item.score.toFixed(2)}</td>
                    <td style="max-width:200px;">${item.groups.join(', ')}</td>
                    <td style="text-align:center;">${percentage}%</td>
                </tr>`;
            });
            html += '</table>';
            document.getElementById('analysis-content').innerHTML = html;
        }

        function renderGroups() {
            let { groups, analysis } = currentAnalysis;
            let html = '<div class="groups-container">';
            for (let [name, numbers] of Object.entries(groups)) {
                let sorted = numbers.sort((a,b) => a-b);
                let groupStats = analysis.filter(a => sorted.includes(a.number));
                let avgScore = (groupStats.reduce((sum, a) => sum + a.score, 0) / groupStats.length).toFixed(1);
                let maxCount = Math.max(...groupStats.map(a => a.count));
                html += `<div class="group-card"><div class="group-header"><span>${name}</span><span>${sorted.length}개</span></div><div class="group-numbers">`;
                sorted.forEach(n => {
                    let item = analysis.find(a => a.number === n);
                    let highlight = item && item.count >= 3;
                    html += `<span class="number-badge" style="${highlight ? 'background:#ffd700; color:#000;' : ''}">${n}</span>`;
                });
                html += `</div><div style="margin-top:5px; font-size:8px; color:#aaa;">평균 점수: ${avgScore} | 최대 그룹수: ${maxCount}</div></div>`;
            }
            html += '</div>';
            document.getElementById('groups-content').innerHTML = html;
        }

        function renderCorrelation() {
            let { correlation, groups } = currentAnalysis;
            let { numbers, pairs } = correlation;
            let html = '<h3 style="color:#ffd700;">🔄 숫자 간 연관성</h3>';
            let topPairs = Object.entries(pairs)
                .map(([key, count]) => ({ key, count, numbers: key.split(',').map(Number) }))
                .sort((a, b) => b.count - a.count)
                .slice(0, 20);
            html += '<div style="margin:15px 0;"><div style="color:#aaa; margin-bottom:5px;">🔝 가장 많이 함께 등장한 쌍</div>';
            topPairs.forEach(p => {
                let percentage = ((p.count / Object.keys(groups).length) * 100).toFixed(1);
                html += `<div style="display:flex; align-items:center; margin:5px 0; padding:5px; background:#222; border-radius:30px;">
                    <span class="big-number level-1" style="width:30px; height:30px; font-size:12px;">${p.numbers[0]}</span>
                    <span style="margin:0 5px;">↔</span>
                    <span class="big-number level-2" style="width:30px; height:30px; font-size:12px;">${p.numbers[1]}</span>
                    <div style="margin-left:10px; flex:1;">
                        <div style="font-size:11px;">${p.count}개 그룹에서 동시 등장</div>
                        <div class="score-bar"><div class="score-fill" style="width:${percentage}%;"></div></div>
                    </div>
                </div>`;
            });
            html += '</div>';

            html += '<div style="margin-top:20px;"><div style="color:#aaa; margin-bottom:5px;">🗺️ 연관성 히트맵 (상위 10개 숫자)</div>';
            let topNumbers = numbers.slice(0, 10);
            html += '<div style="overflow-x:auto;"><table style="border-collapse:collapse;"><tr><th style="background:#333;"></th>';
            topNumbers.forEach(n => html += `<th style="background:#333; padding:5px;">${n}</th>`);
            html += '</tr>';
            for (let a of topNumbers) {
                html += `<tr><th style="background:#333; padding:5px;">${a}</th>`;
                for (let b of topNumbers) {
                    if (a === b) { html += '<td style="background:#111;"></td>'; continue; }
                    let key1 = `${Math.min(a,b)},${Math.max(a,b)}`;
                    let key2 = `${Math.max(a,b)},${Math.min(a,b)}`;
                    let count = pairs[key1] || pairs[key2] || 0;
                    html += `<td style="background:rgba(255,215,0,${count/10}); text-align:center; padding:5px; border:1px solid #333;">${count}</td>`;
                }
                html += '</tr>';
            }
            html += '</table></div></div>';
            document.getElementById('correlation-content').innerHTML = html;
        }

        function renderStats() {
            let { stats, groups, analysis } = currentAnalysis;
            let groupNames = Object.keys(groups);
            let groupSizes = Object.values(stats.groupSizes);
            let html = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${stats.totalGroups}</div><div class="stat-label">전체 그룹</div></div>
                    <div class="stat-card"><div class="stat-value">${stats.totalNumbers}</div><div class="stat-label">고유 숫자</div></div>
                    <div class="stat-card"><div class="stat-value">${Math.max(...groupSizes)}</div><div class="stat-label">최대 그룹 크기</div></div>
                    <div class="stat-card"><div class="stat-value">${Math.min(...groupSizes)}</div><div class="stat-label">최소 그룹 크기</div></div>
                    <div class="stat-card"><div class="stat-value">${(groupSizes.reduce((a,b)=>a+b,0)/groupSizes.length).toFixed(1)}</div><div class="stat-label">평균 그룹 크기</div></div>
                    <div class="stat-card"><div class="stat-value">${analysis.filter(a => a.count >= 3).length}</div><div class="stat-label">핵심 숫자(3+그룹)</div></div>
                </div>
            `;
            html += '<div style="margin:20px 0;"><div style="color:#ffd700;">📊 그룹별 숫자 분포</div>';
            groupNames.forEach(name => {
                let size = stats.groupSizes[name];
                let percentage = (size / stats.totalNumbers * 100).toFixed(1);
                html += `<div style="margin:5px 0;"><div style="display:flex; justify-content:space-between; font-size:11px;"><span>${name}</span><span>${size}개 (${percentage}%)</span></div><div class="score-bar"><div class="score-fill" style="width:${percentage}%;"></div></div></div>`;
            });
            html += '</div>';

            html += '<div style="margin:20px 0;"><div style="color:#ffd700;">🔄 그룹 간 중복도</div>';
            let overlapMatrix = [];
            for (let i = 0; i < groupNames.length; i++) {
                for (let j = i+1; j < groupNames.length; j++) {
                    let set1 = new Set(groups[groupNames[i]]);
                    let set2 = new Set(groups[groupNames[j]]);
                    let overlap = [...set1].filter(x => set2.has(x)).length;
                    let union = new Set([...set1, ...set2]).size;
                    let jaccard = (overlap / union * 100).toFixed(1);
                    if (overlap > 0) overlapMatrix.push({ g1: groupNames[i], g2: groupNames[j], overlap, jaccard });
                }
            }
            overlapMatrix.sort((a,b) => b.overlap - a.overlap).slice(0, 10).forEach(item => {
                html += `<div style="margin:5px 0; padding:5px; background:#222; border-radius:10px;"><div style="display:flex; justify-content:space-between; font-size:11px;"><span>${item.g1} ↔ ${item.g2}</span><span>${item.overlap}개 중복 (${item.jaccard}%)</span></div></div>`;
            });
            html += '</div>';
            document.getElementById('stats-content').innerHTML = html;
        }

        // ========== 유틸리티 ==========
        function clearData() {
            document.getElementById('dataInput').value = '';
            currentAnalysis = null; currentGroups = null;
            document.getElementById('overview-content').innerHTML = '<div class="loading">분석을 시작하려면 데이터를 입력하세요</div>';
            document.getElementById('analysis-content').innerHTML = '';
            document.getElementById('groups-content').innerHTML = '';
            document.getElementById('correlation-content').innerHTML = '';
            document.getElementById('stats-content').innerHTML = '';
            document.getElementById('backtestResult').innerHTML = '백테스트 결과가 여기에 표시됩니다.';
            document.getElementById('modeDisplay').textContent = '대기 중';
            document.getElementById('modeDisplay').style.color = '#aaa';
        }

        function showSample() {
            const total = LOTTO_DATA.length;
            const recent30 = LOTTO_DATA.slice(Math.max(0, total - 30), total);
            const recent60 = LOTTO_DATA.slice(Math.max(0, total - 60), total);
            const flatten = (arr) => { const nums = []; arr.forEach(row => { for (let i = 1; i < row.length; i++) nums.push(row[i]); }); return nums; };
            const text = `최근 30회: ${flatten(recent30).join(' ')}\n최근 60회: ${flatten(recent60).join(' ')}\n전체: ${flatten(LOTTO_DATA).join(' ')}`;
            document.getElementById('dataInput').value = text;
            analyzeData();
        }

        function copyResult() {
            if (!currentAnalysis) { alert('분석 결과가 없습니다.'); return; }
            let text = `=== 교집합 분석 결과 ===\n전체 그룹: ${currentAnalysis.stats.totalGroups}개\n분석 숫자: ${currentAnalysis.stats.totalNumbers}개\n\n=== 추천 순위 (TOP 10) ===\n`;
            currentAnalysis.analysis.slice(0, 10).forEach((item, idx) => {
                text += `${idx+1}. ${item.number} (${item.count}개 그룹, 점수 ${item.score.toFixed(2)})\n`;
            });
            navigator.clipboard.writeText(text).then(() => alert('📋 분석 결과가 복사되었습니다!'));
        }

        function exportData() {
            if (!currentAnalysis) return;
            let data = { timestamp: new Date().toISOString(), stats: currentAnalysis.stats, analysis: currentAnalysis.analysis, groups: currentAnalysis.groups, correlation: currentAnalysis.correlation };
            let blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `analysis_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function printReport() { window.print(); }

        // ========== 드래그 앤 드롭 ==========
        document.addEventListener('DOMContentLoaded', function() {
            const textarea = document.getElementById('dataInput');
            textarea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.style.borderColor = '#00e6b8';
                this.style.boxShadow = '0 0 20px rgba(0,230,184,0.3)';
            });
            textarea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.style.borderColor = '#ffd700';
                this.style.boxShadow = 'none';
            });
            textarea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.style.borderColor = '#ffd700';
                this.style.boxShadow = 'none';
                const file = e.dataTransfer.files[0];
                if (!file) {
                    alert('파일이 아닙니다. 텍스트 파일을 끌어다 놓으세요.');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    textarea.value = ev.target.result;
                    alert('✅ 파일이 드래그 앤 드롭으로 로드되었습니다!');
                };
                reader.onerror = function() {
                    alert('파일 읽기에 실패했습니다.');
                };
                reader.readAsText(file);
            });

            autoFillBacktest();
            document.getElementById('modeDisplay').textContent = '대기 중 (분석 후 백테스트 가능)';
            document.getElementById('modeDisplay').style.color = '#aaa';
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) analyzeData();
        });
    </script>
</body>
</html>
